name: Job Watch
# Triggered externally via cron-job.org calling the workflow_dispatch API
# endpoint on a fixed interval (GitHub's own `schedule:` trigger is
# unreliable/deprioritized under load, and running both in parallel risks
# two concurrent runs racing on the same Gist state). Interval is configured
# in the cron-job.org dashboard, not here.
on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          BOT_ERRORS_CHANNEL_ID: ${{ secrets.BOT_ERRORS_CHANNEL_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
